<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #111;
    }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: .35rem;
    }

    input[type="url"] {
      width: 100%;
      padding: .6rem .75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type="url"]:focus { border-color: #4f6ef7; }

    .format-row {
      display: flex;
      gap: .75rem;
      margin: 1rem 0 1.25rem;
    }

    .format-row label {
      margin: 0;
      font-weight: 400;
    }

    .format-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .55rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      font-size: .95rem;
      color: #444;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .format-btn input { display: none; }
    .format-btn:has(input:checked) {
      border-color: #4f6ef7;
      background: #eef1ff;
      color: #2d45d4;
      font-weight: 600;
    }

    button[type="submit"] {
      width: 100%;
      padding: .7rem;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #3a58e0; }
    button[type="submit"]:disabled { background: #a0aef9; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      display: none;
    }
    .result.visible { display: block; }

    .result-label {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #888;
      margin-bottom: .5rem;
    }

    .citation-box {
      background: #f8f8f8;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      padding: .9rem 1rem;
      font-size: .95rem;
      line-height: 1.6;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-btn {
      margin-top: .75rem;
      padding: .45rem .9rem;
      background: transparent;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
      color: #444;
      transition: border-color .15s, color .15s;
    }
    .copy-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
    .copy-btn.copied { border-color: #22c55e; color: #22c55e; }

    .error {
      margin-top: 1rem;
      padding: .75rem 1rem;
      background: #fff0f0;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: .9rem;
      display: none;
    }
    .error.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Citator</h1>
    <form id="form">
      <label for="url">URL</label>
      <input type="url" id="url" placeholder="https://example.com/article" required autofocus>

      <div class="format-row" style="margin-top:1rem;">
        <label class="format-btn">
          <input type="radio" name="format" value="APA7" checked> APA 7
        </label>
        <label class="format-btn">
          <input type="radio" name="format" value="MLA"> MLA
        </label>
      </div>

      <button type="submit" id="submit-btn">Generate citation</button>
    </form>

    <div class="error" id="error"></div>

    <div class="result" id="result">
      <div class="result-label" id="result-label"></div>
      <div class="citation-box" id="citation"></div>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
  </div>

  <script>
    // ── Metadata helpers ─────────────────────────────────────────────────────
    function getMeta(doc, ...names) {
      for (const name of names) {
        for (const attr of ['name', 'property']) {
          const el = doc.querySelector(`meta[${attr}="${name}"]`) ||
                     doc.querySelector(`meta[${attr}="og:${name}"]`);
          if (el) {
            const v = el.getAttribute('content');
            if (v) return v.trim();
          }
        }
      }
      return null;
    }

    function decodeEntities(str) {
      if (!str) return str;
      return str
        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, ' ');
    }

    function parseDate(raw) {
      if (!raw) return null;
      const d = new Date(raw);
      return isNaN(d) ? null : d;
    }

    // ── Name formatters ──────────────────────────────────────────────────────
    function toAPA(author) {
      if (!author) return null;
      const parts = author.trim().split(/\s+/);
      if (parts.length < 2) return author;
      const last  = parts.at(-1);
      const inits = parts.slice(0, -1).map(p => p[0] + '.').join(' ');
      return `${last}, ${inits}`;
    }

    function toMLA(author) {
      if (!author) return null;
      const parts = author.trim().split(/\s+/);
      if (parts.length < 2) return author;
      const last  = parts.at(-1);
      const first = parts.slice(0, -1).join(' ');
      return `${last}, ${first}`;
    }

    // ── Month names ──────────────────────────────────────────────────────────
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    // ── Citation builders ────────────────────────────────────────────────────
    function buildAPA(title, author, siteName, date, url) {
      const parts = [];
      const a = toAPA(author);
      if (a) parts.push(a);
      if (date) parts.push(`(${date.getFullYear()}, ${MONTHS[date.getMonth()]} ${date.getDate()})`);
      else       parts.push('(n.d.)');
      if (title)    parts.push(title);   // italics handled by display
      if (siteName) parts.push(siteName);
      return parts.join('. ').replace(/\.+$/, '') + '. ' + url;
    }

    function buildMLA(title, author, siteName, date, url) {
      const accessed = new Date();
      let c = '';
      const a = toMLA(author);
      if (a)        c += `${a}. `;
      if (title)    c += `"${title}." `;
      if (siteName) c += `${siteName}, `;
      if (date)     c += `${date.getDate()} ${MONTHS[date.getMonth()]} ${date.getFullYear()}, `;
      c += `${url}. `;
      c += `Accessed ${accessed.getDate()} ${MONTHS[accessed.getMonth()]} ${accessed.getFullYear()}.`;
      return c;
    }

    // ── Fetch via CORS proxy ─────────────────────────────────────────────────
    async function fetchHTML(url) {
      let res;
      try {
        res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
      } catch {
        throw new Error('Network error — check your internet connection.');
      }
      if (res.status === 404) throw new Error('Page not found (404). Check the URL.');
      if (res.status === 403) throw new Error('Access denied (403) — the site blocked the request.');
      if (res.status === 429) throw new Error('Too many requests (429) — wait a moment and try again.');
      if (!res.ok)            throw new Error(`Proxy returned an error (${res.status}). Try again later.`);
      let json;
      try { json = await res.json(); } catch {
        throw new Error('Unexpected response from proxy. Try again later.');
      }
      if (!json.contents) throw new Error('The page returned no content. It may require a login or block automated access.');
      return json.contents;
    }

    // ── Form submit ──────────────────────────────────────────────────────────
    const form      = document.getElementById('form');
    const submitBtn = document.getElementById('submit-btn');
    const errorEl   = document.getElementById('error');
    const resultEl  = document.getElementById('result');
    const labelEl   = document.getElementById('result-label');
    const citEl     = document.getElementById('citation');
    const copyBtn   = document.getElementById('copy-btn');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const url    = document.getElementById('url').value.trim();
      const format = form.querySelector('input[name="format"]:checked').value;

      // Reset
      errorEl.className  = 'error';
      resultEl.className = 'result';
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Fetching…';

      try {
        const html   = await fetchHTML(url);
        const parser = new DOMParser();
        const doc    = parser.parseFromString(html, 'text/html');

        const title    = decodeEntities(getMeta(doc, 'title') || doc.querySelector('title')?.textContent?.trim() || null);
        const author   = decodeEntities(getMeta(doc, 'author'));
        const siteName = decodeEntities(getMeta(doc, 'site_name'));
        const date     = parseDate(getMeta(doc, 'article:published_time', 'published_time', 'date'));

        const citation = format === 'APA7'
          ? buildAPA(title, author, siteName, date, url)
          : buildMLA(title, author, siteName, date, url);

        labelEl.textContent    = format === 'APA7' ? 'APA 7' : 'MLA';
        citEl.textContent      = citation;
        resultEl.className     = 'result visible';
        copyBtn.textContent    = 'Copy';
        copyBtn.className      = 'copy-btn';

      } catch (err) {
        errorEl.textContent  = err.message || 'Could not fetch the page. Check the URL and try again.';
        errorEl.className    = 'error visible';
      } finally {
        submitBtn.disabled   = false;
        submitBtn.textContent = 'Generate citation';
      }
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(citEl.textContent).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.className   = 'copy-btn copied';
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.className   = 'copy-btn';
        }, 2000);
      });
    });
  </script>
</body>
</html>
